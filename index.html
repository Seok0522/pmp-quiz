<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMP 문제 풀이</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>PMP 문제 풀이</h1>
            <nav>
                <button id="login-btn">Google 계정으로 로그인</button>
                <button id="notes-btn" style="display: none;">오답노트</button>
            </nav>
        </header>
        <main id="quiz-container">
            <div id="question-number"></div>
            <div id="question-en"></div>
            <div id="question-ko"></div>
            <div id="options-container"></div>
            <button id="submit-btn">답안 제출</button>
            <div id="feedback-container"></div>
            <div id="explanation-container" style="display: none;"></div>
        </main>
        <aside id="notes-container" style="display: none;">
            <h2>나의 오답 노트</h2>
            <div id="notes-list"></div>
            <button id="retake-btn">오답 문제 다시 풀기</button>
        </aside>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <script src="script.js"></script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
